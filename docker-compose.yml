services:

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage
      - ./logs:/app/logs
      - ./db.sqlite3:/app/db.sqlite3
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "5173:80"
    env_file:
      - .env
    depends_on:
      - backend

  db:
    restart: unless-stopped
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-epfiles}
      POSTGRES_USER: ${POSTGRES_USER:-epfiles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epfiles}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  storage_data:
