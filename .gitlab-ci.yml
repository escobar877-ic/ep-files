stages:
  - lint
  - test
  - docs
  - deploy

cache:
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ------------------------------------------------------------------
# Lint
# ------------------------------------------------------------------
pylint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pylint pylint-django anybadge
  script:
    - export DJANGO_SETTINGS_MODULE=main.settings
    - pylint ep_files_app/ main/ --load-plugins=pylint_django --django-settings-module=main.settings --fail-under=8.0 --disable=C0114,C0115,C0116,C0103,R0903,C0303,C0411,C0412,C0304,C0305,W0611,E5110 > pylint.log
    - cat pylint.log
    - SCORE=$(grep -oE "rated at [0-9.]+" pylint.log | awk '{print $3}')
    - anybadge --label=pylint --value=$SCORE --file=pylint.svg 2=red 5=orange 8=yellow 10=green
  artifacts:
    paths:
      - pylint.svg
    expire_in: 4 weeks
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "dev"'

# ------------------------------------------------------------------
# Test
# ------------------------------------------------------------------
pytest:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests --cov=ep_files_app --cov-report=term-missing --cov-fail-under=70
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "dev"'

# ------------------------------------------------------------------
# Docs — сборка Sphinx и публикация на GitLab Pages
# ------------------------------------------------------------------
build-docs:
  stage: docs
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install sphinx sphinx-rtd-theme anybadge
  script:
    - cd docs
    - rm -rf build/html build/doctrees
    - sphinx-build -b html -d build/doctrees source build/html
    - anybadge --label=docs --value=online --file=../docs.svg --color=teal
  artifacts:
    name: "docs-$CI_COMMIT_REF_SLUG"
    paths:
      - docs/build/html/
      - docs.svg
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "feature/ci-cd-docs" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev"'

# GitLab Pages — деплой только с master
pages:
  stage: docs
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install sphinx sphinx-rtd-theme
  script:
    - cd docs
    - rm -rf ../public build/pages-doctrees
    - sphinx-build -b html -d build/pages-doctrees source ../public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

# ------------------------------------------------------------------
# Deploy — автодеплой на сервер при пуше в master
# ------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh root@$SERVER_IP "
        cd ~/ep-files &&
        git pull origin master &&
        docker compose up -d --build
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'